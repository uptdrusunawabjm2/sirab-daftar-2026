<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Rusunawa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: #f8fafc;
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* SIDEBAR MODERN */
        #sidebar {
            width: 260px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: #020617;
            border-right: 1px solid #334155;
            z-index: 1000;
        }

        #sidebar.collapsed { width: 85px; }
        #sidebar.collapsed .menu-text, 
        #sidebar.collapsed .sidebar-footer { display: none; }

        .nav-link {
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .nav-link.active {
            background: rgba(99, 102, 241, 0.1);
            border-left-color: var(--accent);
            color: var(--accent);
        }

        /* TABLE STYLING */
        .table-wrap {
            overflow: auto;
            max-height: calc(100vh - 320px);
            border-radius: 12px;
        }

        .table-modern {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
        }

        .table-modern th {
            background: #1e293b;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 16px;
            border-bottom: 2px solid #334155;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .table-modern td {
            padding: 12px 16px;
            border-bottom: 1px solid #334155;
            background: #0f172a;
        }

        .table-modern tbody tr:hover td {
            background: #1e293b;
        }

        /* FREEZE COLUMN COLORS */
        .table-modern th:nth-child(1), .table-modern td:nth-child(1),
        .table-modern th:nth-child(2), .table-modern td:nth-child(2) {
            position: sticky;
            z-index: 40;
            background: #020617;
        }
        .table-modern th:nth-child(1), .table-modern td:nth-child(1) { left: 0; min-width: 140px; }
        .table-modern th:nth-child(2), .table-modern td:nth-child(2) { left: 140px; min-width: 180px; }

        /* STATUS BADGE */
        .badge {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                height: 100vh;
                left: -260px;
            }
            #sidebar.show { left: 0; }
            .container-admin { padding: 10px; }
            .grid-stats { grid-template-cols: 1fr 1fr; }
        }
    </style>
</head>

<body class="min-h-screen flex overflow-hidden">

<div id="sidebar" class="flex flex-col shadow-2xl">
    <div class="p-6 border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center font-bold">R</div>
            <div class="menu-text">
                <h1 class="font-bold tracking-tight">Rusunawa</h1>
                <p class="text-[10px] text-slate-500 uppercase">Management System</p>
            </div>
        </div>
    </div>

    <nav class="flex-1 p-4 space-y-2">
        <a class="nav-link active flex items-center gap-4 px-4 py-3 rounded-xl cursor-pointer">
            <span class="text-xl">📊</span>
            <span class="menu-text font-medium text-sm">Data Pendaftaran</span>
        </a>
        <a href="tracking" target="_blank" class="nav-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400">
            <span class="text-xl">📍</span>
            <span class="menu-text font-medium text-sm">Tracking</span>
        </a>
        <a href="index" target="_blank" class="nav-link flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-slate-800 text-slate-400">
            <span class="text-xl">📝</span>
            <span class="menu-text font-medium text-sm">Form Daftar</span>
        </a>
    </nav>

    <div class="p-4 border-t border-slate-800 sidebar-footer">
        <button onclick="logout()" class="w-full flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white py-2 rounded-lg transition text-xs font-semibold">
            🚪 Keluar Akun
        </button>
    </div>
</div>

<div id="main" class="flex-1 flex flex-col overflow-hidden relative">
    
    <header class="h-16 bg-slate-900/50 backdrop-blur-md border-b border-slate-800 px-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <h2 class="font-semibold text-slate-200">Dashboard</h2>
        </div>
        <div class="flex items-center gap-2">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Live Monitoring</span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
        
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-slate-800/40 border border-slate-700 p-5 rounded-2xl">
                <p class="text-slate-400 text-xs font-semibold uppercase">Total Pemohon</p>
                <h3 id="rTotal" class="text-3xl font-bold mt-1">0</h3>
            </div>
            <div class="bg-yellow-500/10 border border-yellow-500/30 p-5 rounded-2xl">
                <p class="text-yellow-500 text-xs font-semibold uppercase">Menunggu</p>
                <h3 id="rPending" class="text-3xl font-bold mt-1 text-yellow-500">0</h3>
            </div>
            <div class="bg-emerald-500/10 border border-emerald-500/30 p-5 rounded-2xl">
                <p class="text-emerald-500 text-xs font-semibold uppercase">Diterima</p>
                <h3 id="rAcc" class="text-3xl font-bold mt-1 text-emerald-500">0</h3>
            </div>
            <div class="bg-rose-500/10 border border-rose-500/30 p-5 rounded-2xl">
                <p class="text-rose-500 text-xs font-semibold uppercase">Ditolak</p>
                <h3 id="rReject" class="text-3xl font-bold mt-1 text-rose-500">0</h3>
            </div>
        </div>

        <div class="bg-slate-800/20 p-4 rounded-2xl border border-slate-700 flex flex-col md:flex-row gap-3">
            <div class="relative flex-1">
                <span class="absolute left-3 top-2.5 text-slate-500">🔍</span>
                <input id="cari" placeholder="Cari nama, rusun, atau status..." 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <select id="filterStatus" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">Semua Status</option>
                <option value="MENUNGGU">MENUNGGU</option>
                <option value="VERIFIKASI">VERIFIKASI</option>
                <option value="DIPROSES">DIPROSES</option>
                <option value="DITERIMA">DITERIMA</option>
                <option value="DITOLAK">DITOLAK</option>
            </select>
            <button onclick="exportXLSX()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2">
                📥 Export Excel
            </button>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80">
                <div class="flex items-center gap-2 text-xs text-slate-400">
                    Tampilkan 
                    <select id="rowsPerPage" class="bg-slate-800 border border-slate-700 rounded px-1 py-0.5 outline-none">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button onclick="prevPage()" class="p-2 hover:bg-slate-800 rounded-lg transition">◀</button>
                    <span id="pageInfo" class="text-xs font-medium self-center px-2 text-slate-300"></span>
                    <button onclick="nextPage()" class="p-2 hover:bg-slate-800 rounded-lg transition">▶</button>
                </div>
            </div>
            
            <div class="table-wrap">
                <table id="table" class="table-modern"></table>
            </div>
        </div>

    </main>
</div>

<div id="modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center p-4 z-[9999]">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl space-y-4">
        <h2 class="text-xl font-bold flex items-center gap-2">
            <span class="text-indigo-500">✏️</span> Update Verifikasi
        </h2>
        
        <div class="space-y-3">
            <div>
                <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Status Verifikasi</label>
                <select id="mStatus" class="w-full mt-1 p-3 rounded-xl bg-slate-800 border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option>MENUNGGU</option>
                    <option>VERIFIKASI</option>
                    <option>DIPROSES</option>
                    <option>DITERIMA</option>
                    <option>DITOLAK</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Catatan</label>
                <textarea id="mCatatan" class="w-full mt-1 p-3 rounded-xl bg-slate-800 border border-slate-700 h-24 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Tulis alasan atau catatan..."></textarea>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Tanggal</label>
                    <input type="date" id="mTanggal" class="w-full mt-1 p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Unit</label>
                    <input id="mUnit" class="w-full mt-1 p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm" placeholder="Contoh: A.101">
                </div>
            </div>
            <input id="mNo" type="hidden">
        </div>

        <div class="flex gap-3 pt-4">
            <button onclick="simpan()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-bold transition active:scale-95 shadow-lg shadow-indigo-500/20">Simpan Perubahan</button>
            <button onclick="closeModal()" class="px-6 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-medium transition">Batal</button>
        </div>
    </div>
</div>

<div id="modalDetail" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md hidden items-center justify-center p-4 z-[9999]">
    <div class="bg-slate-900 border border-slate-700 text-slate-200 rounded-3xl p-8 w-full max-w-2xl max-h-[85vh] overflow-hidden flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="font-bold text-2xl tracking-tight">Detail Pendaftaran</h2>
                <p class="text-xs text-slate-500 mt-1">Data lengkap formulir yang dikirimkan oleh pemohon</p>
            </div>
            <button onclick="closeDetail()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 hover:bg-rose-500 transition group">
                <span class="text-slate-400 group-hover:text-white">✕</span>
            </button>
        </div>

        <div id="detailContent" class="flex-1 overflow-y-auto pr-2 space-y-4 custom-scroll">
            </div>

        <div class="mt-8 pt-6 border-t border-slate-800 flex gap-3">
            <button onclick="downloadPDF()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-2xl font-bold transition flex items-center justify-center gap-2">
                📄 Cetak ke PDF
            </button>
        </div>
    </div>
</div>

<script>
const API = CONFIG.API;
const KEY = CONFIG.INTERNAL_KEY;

let HEAD=[], DATA=[], RAW_DATA=[];
let page=1, rows=25, lastHash="", ROW=null;
const ROLE = localStorage.getItem("RUSUN_ROLE") || "admin";

async function load(){
  try {
    const r = await fetch(API+"?action=daftar_all&key="+KEY);
    const j = await r.json();
    const newHash = JSON.stringify(j.data);

    if(newHash!==lastHash){
      HEAD=j.header;
      RAW_DATA=j.data;
      DATA=[...RAW_DATA];
      lastHash=newHash;
      hitung();
      render();
    }
  } catch(e) { console.error("Load data failed"); }
}

function hitung(){
  const idx=HEAD.indexOf("Status Verifikasi");
  let p=0,a=0,rj=0;
  DATA.forEach(d=>{
    if(d[idx]==="DITERIMA") a++;
    else if(d[idx]==="DITOLAK") rj++;
    else p++;
  });
  document.getElementById('rTotal').textContent=DATA.length;
  document.getElementById('rPending').textContent=p;
  document.getElementById('rAcc').textContent=a;
  document.getElementById('rReject').textContent=rj;
}

function render(){
  const currentRows = parseInt(rowsPerPage.value);
  const maxPage = Math.max(1, Math.ceil(DATA.length / currentRows));
  if(page > maxPage) page = maxPage;

  const start=(page-1)*currentRows;
  const slice=DATA.slice(start,start+currentRows);

  let h="<thead><tr>";
  HEAD.forEach(c=>h+=`<th>${c}</th>`);
  h+="<th class='text-center'>Aksi</th></tr></thead><tbody>";

  slice.forEach((r,i)=>{
    const idx=start+i;
    h+="<tr>";
    r.forEach((v,ci)=>{
      if(HEAD[ci]==="Tanggal Formulir" && v){
        const d = new Date(v);
        const bulan=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
        if(!isNaN(d)) v = d.getDate()+" "+bulan[d.getMonth()]+" "+d.getFullYear();
      }
      
      // Styling khusus status verifikasi
      if(HEAD[ci]==="Status Verifikasi"){
          let color = "bg-slate-700";
          if(v === "DITERIMA") color = "bg-emerald-500/20 text-emerald-400 border border-emerald-500/40";
          if(v === "DITOLAK") color = "bg-rose-500/20 text-rose-400 border border-rose-500/40";
          if(v === "MENUNGGU") color = "bg-yellow-500/20 text-yellow-500 border border-yellow-500/40";
          h+=`<td><span class="badge ${color}">${v||""}</span></td>`;
      } else {
          h+=`<td>${v||""}</td>`;
      }
    });

    h+=`<td class='flex items-center justify-center gap-2'>`;
    if(ROLE === "super"){
      h+=`<button onclick='openModal(${idx})' class='p-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg transition text-[10px] font-bold'>UPDATE</button>`;
    }
    h+=`<button onclick='lihatDetail(${idx})' class='p-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg transition text-[10px] font-bold'>DETAIL</button></td></tr>`;
  });

  h+="</tbody>";
  document.getElementById('table').innerHTML=h;
  document.getElementById('pageInfo').textContent=`${page} / ${maxPage}`;
}

// LOGIKA MODAL, FILTER, & REALTIME (DIPERTAHANKAN SESUAI ASLI)
function openModal(i){
  ROW=i;
  const idxStatus = HEAD.indexOf("Status Verifikasi");
  const idxCatatan = HEAD.indexOf("Catatan Verifikasi");
  const idxTanggal = HEAD.indexOf("Tanggal Verifikasi");
  const idxNo = HEAD.indexOf("No Pendaftaran");
  let idxUnit = HEAD.indexOf("_unit");
  if(idxUnit===-1) idxUnit = HEAD.indexOf("Unit");

  mStatus.value = DATA[i][idxStatus] || "MENUNGGU";
  mCatatan.value = DATA[i][idxCatatan] || "";
  const tgl = DATA[i][idxTanggal];
  if(tgl){
    const d = new Date(tgl);
    mTanggal.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  } else { mTanggal.value = ""; }
  mNo.value = DATA[i][idxNo] || "";
  mUnit.value = DATA[i][idxUnit] || "";
  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

function closeModal(){ modal.classList.add("hidden"); modal.classList.remove("flex"); }

async function simpan(){
  if(ROLE !== "super") return alert("Akses Ditolak");
  const token = localStorage.getItem("RUSUN_TOKEN");
  const noLama = DATA[ROW][HEAD.indexOf("No Pendaftaran")];
  try{
    const fd = new URLSearchParams();
    fd.append("action","daftar_update"); fd.append("token",token); fd.append("key",KEY);
    fd.append("no_lama",noLama); fd.append("status",mStatus.value);
    fd.append("catatan",mCatatan.value); fd.append("tanggal",mTanggal.value);
    fd.append("no_baru",mNo.value); fd.append("unit",mUnit.value);

    const r = await fetch(API,{ method:"POST", body:fd });
    const j = await r.json();
    if(j.status){ closeModal(); await load(); toast("Data diperbarui"); }
  } catch(e){ alert("Koneksi Error"); }
}

function applyFilter(){
  const q = cari.value.toLowerCase();
  const fs = filterStatus.value;
  DATA = RAW_DATA.filter(r=>{
    const idxStatus = HEAD.indexOf("Status Verifikasi");
    const idxNama = HEAD.indexOf("Nama Pemohon");
    const idxRusun = HEAD.indexOf("Rusunawa");
    const matchStatus = fs ? r[idxStatus] === fs : true;
    const matchCari = !q || [r[idxNama], r[idxRusun], r[idxStatus]].some(v => String(v||"").toLowerCase().includes(q));
    return matchStatus && matchCari;
  });
  page=1; render();
}

function toggleSidebar(){
  const sb = document.getElementById("sidebar");
  if(window.innerWidth <= 768) sb.classList.toggle("show");
  else sb.classList.toggle("collapsed");
}

function toast(msg){
  const t=document.createElement("div");
  t.className="fixed top-6 right-6 px-6 py-3 bg-indigo-600 text-white rounded-2xl shadow-2xl z-[10000] text-sm font-bold animate-bounce";
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function exportXLSX(){
  if(!DATA.length) return alert("Data kosong");
  const ws = XLSX.utils.aoa_to_sheet([HEAD, ...DATA]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Data");
  XLSX.writeFile(wb, "Data_Pendaftaran_Rusun.xlsx");
}

function lihatDetail(i){
  const d = DATA[i];
  let html = `<div class="grid grid-cols-1 gap-4">`;
  HEAD.forEach((h,idx)=>{
    html+=`
      <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
        <label class="text-[10px] uppercase font-bold text-slate-500">${h}</label>
        <p class="text-sm text-slate-200 mt-1">${d[idx]||"-"}</p>
      </div>`;
  });
  html += `</div>`;
  detailContent.innerHTML = html;
  modalDetail.classList.remove("hidden");
  modalDetail.classList.add("flex");
}

function closeDetail(){ modalDetail.classList.add("hidden"); modalDetail.classList.remove("flex"); }

function prevPage(){ if(page > 1){ page--; render(); } }
function nextPage(){ if(page < Math.ceil(DATA.length/parseInt(rowsPerPage.value))){ page++; render(); } }

cari.oninput = applyFilter;
filterStatus.onchange = applyFilter;
rowsPerPage.onchange = () => { page=1; render(); };

// INITIALIZE
(async ()=>{
  await load();
  setInterval(load, 5000); // Poll data every 5s
})();
</script>
</body>
</html>
