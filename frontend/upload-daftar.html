<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Upload Dokumen Pendaftaran</title>

<script src="config.js"></script>

<script>
const API_UPLOAD="https://script.google.com/macros/s/AKfycbz7S_e-B8vOOfOyJDgEMVq0GZwYVs3V6Is-2YM1EXNEAQg9LPTrlRnSnuDED04LEjqKLg/exec";
</script>

<style>

*{
box-sizing:border-box;
font-family:system-ui;
}

body{
margin:0;
background:#f3f4f6;
display:flex;
justify-content:center;
padding:20px;
}

.container{
max-width:520px;
width:100%;
}

.card{
background:white;
border-radius:16px;
padding:24px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.page{display:none}
.page.active{display:block}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

.preview{
margin-top:10px;
max-width:100%;
display:none;
}

.buttons{
display:flex;
gap:10px;
margin-top:20px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.next{background:#2563eb;color:white}
.prev{background:#e5e7eb}
.submit{background:#16a34a;color:white}

.progress{
margin-top:10px;
font-size:13px;
}


.loader{
display:none;
margin-top:15px;
height:6px;
background:#e5e7eb;
border-radius:6px;
overflow:hidden;
}

.loader span{
display:block;
height:100%;
width:40%;
background:#16a34a;
animation:loading 1s infinite;
}

@keyframes loading{
0%{margin-left:-40%;}
100%{margin-left:100%;}
}

.submit.loading{
background:#6b7280;
cursor:not-allowed;
}

.submit.loading:after{
content:"...";
animation:dots 1s infinite;
}

@keyframes dots{
0%{content:"."}
33%{content:".."}
66%{content:"..."}
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<div class="progress" id="progress">
Dokumen 0 / 10 selesai
</div>

<div class="loader" id="loader">
<span></span>
</div>

<form id="form">

<div class="page active">

<h2>Cek Data</h2>

<input id="no" placeholder="Nomor Pendaftaran">

<div class="buttons">
<button type="button" class="next" onclick="cek()">Cek</button>
</div>

</div>

<div class="page">

<h2>Data Pemohon</h2>

<input id="nama" readonly>
<input id="hp" readonly>
<input id="rusun" readonly>

<div class="buttons">
<button type="button" class="prev" onclick="prev()">Kembali</button>
<button type="button" class="next" onclick="next()">Upload</button>
</div>

</div>

</form>

</div>
</div>

<script>

/* daftar dokumen */

const uploads=[
["kk","Kartu Keluarga"],
["ktp_pemohon","KTP Pemohon"],
["nikah","Buku Nikah"],
["penghasilan","Surat Penghasilan"],
["belum_rumah","Belum Memiliki Rumah"],
["pasfoto","Pas Foto"],
["foto_keluarga","Foto Keluarga"],
["surat_penjamin","Surat Penjamin"],
["ktp_penjamin","KTP Penjamin"],
["foto_penjamin","Foto Penjamin"]
];

const form=document.getElementById("form");

uploads.forEach(u=>{

const div=document.createElement("div");
div.className="page";

div.innerHTML=`
<h3>${u[1]}</h3>

<input type="file" id="${u[0]}" accept="image/*,.pdf" onchange="preview(this)">
<img class="preview">

<div class="buttons">
<button type="button" class="prev" onclick="prev()">Kembali</button>
<button type="button" class="next" onclick="next()">Lanjut</button>
</div>
`;

form.appendChild(div);

});

const last=document.createElement("div");

last.className="page";

last.innerHTML=`
<h2>Kirim</h2>

<div class="buttons">
<button type="submit" class="submit" id="uploadBtn">
Upload
</button>
</div>
`;

form.appendChild(last);

/* halaman */

let page=0;
const pages=document.querySelectorAll(".page");

function show(i){
pages.forEach(p=>p.classList.remove("active"));
pages[i].classList.add("active");
page=i;
}

function next(){show(page+1)}
function prev(){show(page-1)}

/* cek data */

async function cek(){

const no=document.getElementById("no").value;

if(!no){
alert("Nomor pendaftaran wajib diisi");
return;
}

const r=await fetch(CONFIG.API+"?action=track&q="+no);
const j=await r.json();

if(!j.status){
alert("Data tidak ditemukan");
return;
}

document.getElementById("nama").value=j.nama;
document.getElementById("hp").value=j.hp;
document.getElementById("rusun").value=j.rusun;

next();

}

/* preview */

function preview(input){

const file=input.files[0];
if(!file)return;

if(file.size>2*1024*1024){
alert("Maksimal 2MB");
input.value="";
return;
}

const img=input.nextElementSibling;

if(file.type.startsWith("image")){
img.src=URL.createObjectURL(file);
img.style.display="block";
}

updateProgress();

}

/* progress */

function updateProgress(){

let count=0;

uploads.forEach(u=>{
if(document.getElementById(u[0]).files[0]) count++;
});

document.getElementById("progress").innerText=
"Dokumen "+count+" / "+uploads.length+" selesai";

}

/* upload */

form.addEventListener("submit",async e=>{

e.preventDefault();

const btn=document.getElementById("uploadBtn");

btn.classList.add("loading");
btn.innerText="Mengirim";
btn.disabled=true;

document.getElementById("loader").style.display="block";

try{

let uploaded=0;

for(const u of uploads){

const f=document.getElementById(u[0]).files[0];
if(!f) continue;

const fd = new FormData();

fd.append("action","upload");
fd.append("no",document.getElementById("no").value);
fd.append("nama",document.getElementById("nama").value);
fd.append("hp",document.getElementById("hp").value);
fd.append("jenis",u[0]);
fd.append("file",f);

const controller = new AbortController();

const timeout = setTimeout(()=>{
controller.abort();
},30000); // 30 detik timeout

const r = await fetch(API_UPLOAD,{
method:"POST",
mode:"cors",
body:fd
});

if(!r.ok){
throw new Error("HTTP "+r.status);
}

const j = await r.json();

if(!j.status){
throw new Error(j.message);
}

uploaded++;

btn.innerText=`Mengirim ${uploaded}/${uploads.length}`;

}

document.getElementById("loader").style.display="none";

btn.innerText="Upload Berhasil ✓";
btn.style.background="#16a34a";

setTimeout(()=>location.reload(),1200);

}catch(err){

document.getElementById("loader").style.display="none";

btn.innerText="Upload Gagal";
btn.style.background="#dc2626";

alert(err.message || "Upload gagal");

}

});

async function retryUpload(data){

for(let i=0;i<3;i++){

try{

const r = await fetch(API_UPLOAD,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

if(!r.ok){
throw new Error("HTTP "+r.status);
}

const text = await r.text();

let j;

try{
j = JSON.parse(text);
}catch{
console.error("Response bukan JSON:",text);
throw "Response bukan JSON";
}

if(j && j.status === true){
return true;
}

}catch(e){

console.warn("Retry upload",i,e);

await new Promise(r=>setTimeout(r,800));

}

}

throw "Upload gagal";

}

function fileToBase64(file){

return new Promise(res=>{

const r=new FileReader();

r.onload=()=>res(r.result.split(",")[1]);

r.readAsDataURL(file);

});

}

</script>

</body>
</html>
